<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レジシステム</title>

  <!-- Mantine CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mantine/core@7.17.1/styles.css" />

  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Mantine (UMD build) -->
  <script src="https://cdn.jsdelivr.net/npm/@mantine/core@7.17.1/dist/mantine-core.umd.cjs"></script>

  <!-- Babel for JSX in browser -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel">
    const {
      MantineProvider, AppShell, Group, Stack, Title, Text, Button,
      ActionIcon, Modal, TextInput, NumberInput, Table, Box, Divider,
    } = Mantine;
    const { useState } = React;

    // Simple SVG icons (Tabler icons not available as UMD, so inline SVG)
    const IconMenu2 = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    );
    const IconPlus = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    );
    const IconPencil = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    );
    const IconTrash = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    );

    function App() {
      const [products, setProducts] = useState([]);
      const [sales, setSales] = useState([]);
      const [navOpen, setNavOpen] = useState(false);
      const [salesModal, setSalesModal] = useState(false);
      const [productModal, setProductModal] = useState(false);
      const [newProductName, setNewProductName] = useState("");
      const [newProductPrice, setNewProductPrice] = useState("");
      const [editingProduct, setEditingProduct] = useState(null);
      const [cart, setCart] = useState([]);
      const [payment, setPayment] = useState("");
      const [checkoutMode, setCheckoutMode] = useState(false);

      const openAddProduct = () => {
        setEditingProduct(null);
        setNewProductName("");
        setNewProductPrice("");
        setProductModal(true);
      };

      const openEditProduct = (p) => {
        setEditingProduct(p);
        setNewProductName(p.name);
        setNewProductPrice(p.price);
        setProductModal(true);
      };

      const saveProduct = () => {
        const price = Number(newProductPrice);
        if (!newProductName || !price) return;
        if (editingProduct) {
          setProducts(prev => prev.map(p =>
            p.id === editingProduct.id ? { ...p, name: newProductName, price } : p
          ));
        } else {
          setProducts(prev => [...prev, { id: Date.now(), name: newProductName, price }]);
        }
        setProductModal(false);
        setNewProductName("");
        setNewProductPrice("");
        setEditingProduct(null);
      };

      const deleteProduct = (id) => {
        setProducts(prev => prev.filter(p => p.id !== id));
        setCart(prev => prev.filter(p => p.id !== id));
      };

      const cartTotal = cart.reduce((sum, c) => sum + c.price, 0);
      const paymentNum = Number(payment);
      const change = paymentNum >= cartTotal && cartTotal > 0 ? paymentNum - cartTotal : null;

      const removeFromCart = (index) => {
        setCart(prev => prev.filter((_, i) => i !== index));
      };

      const handleCheckout = () => {
        if (cart.length === 0 || paymentNum < cartTotal) return;
        setSales(prev => [...prev, { items: [...cart], total: cartTotal, timestamp: new Date() }]);
        setCart([]);
        setPayment("");
        setCheckoutMode(false);
      };

      const totalSales = sales.reduce((sum, s) => sum + s.total, 0);

      return (
        <MantineProvider>
          <AppShell
            header={{ height: 60 }}
            navbar={{
              width: 200,
              breakpoint: "sm",
              collapsed: { mobile: !navOpen, desktop: !navOpen },
            }}
            padding="md"
          >
            <AppShell.Header p="xs">
              <Group h="100%">
                <ActionIcon variant="subtle" onClick={() => setNavOpen(o => !o)}>
                  <IconMenu2 />
                </ActionIcon>
                <Title order={3}>レジシステム</Title>
              </Group>
            </AppShell.Header>

            <AppShell.Navbar p="md">
              <Stack>
                <Button variant="light" onClick={() => { setSalesModal(true); setNavOpen(false); }}>
                  売上確認
                </Button>
                <Button variant="light" onClick={() => { openAddProduct(); setNavOpen(false); }}>
                  商品追加
                </Button>
                <Button variant="light" onClick={() => { setEditingProduct(null); setProductModal(true); setNavOpen(false); }}>
                  商品一覧・編集
                </Button>
              </Stack>
            </AppShell.Navbar>

            <AppShell.Main>
              {!checkoutMode ? (
                <Box ta="center" mt="xl">
                  <Button size="xl" w={300} onClick={() => setCheckoutMode(true)}>
                    レジへ
                  </Button>
                </Box>
              ) : (
                <Group align="flex-start" gap="xl">
                  <Stack miw={200}>
                    <Title order={4}>商品</Title>
                    {products.length === 0 && (
                      <Text c="dimmed" size="sm">商品が登録されていません</Text>
                    )}
                    {products.map(p => (
                      <Button key={p.id} variant="outline"
                        onClick={() => setCart(prev => [...prev, p])}>
                        {p.name}　{p.price.toLocaleString()}円
                      </Button>
                    ))}
                    <Button mt="md" variant="subtle" color="gray"
                      onClick={() => { setCart([]); setPayment(""); setCheckoutMode(false); }}>
                      キャンセル
                    </Button>
                  </Stack>

                  <Stack miw={260}>
                    <Title order={4}>購入リスト</Title>
                    {cart.length === 0 && (
                      <Text c="dimmed" size="sm">商品を選んでください</Text>
                    )}
                    {cart.map((c, i) => (
                      <Group key={i} justify="space-between">
                        <Text size="sm">{c.name}　{c.price.toLocaleString()}円</Text>
                        <ActionIcon size="sm" color="red" variant="subtle" onClick={() => removeFromCart(i)}>
                          <IconTrash />
                        </ActionIcon>
                      </Group>
                    ))}
                    <Divider />
                    <Text fw={700}>合計: {cartTotal.toLocaleString()}円</Text>

                    <NumberInput
                      label="お支払い金額"
                      value={payment}
                      onChange={setPayment}
                      min={0}
                      hideControls
                      placeholder="金額を入力"
                    />
                    {change !== null && (
                      <Text c="teal" fw={700}>お釣り: {change.toLocaleString()}円</Text>
                    )}
                    {paymentNum > 0 && paymentNum < cartTotal && (
                      <Text c="red" size="sm">支払い金額が不足しています</Text>
                    )}

                    <Button color="green"
                      disabled={cart.length === 0 || paymentNum < cartTotal}
                      onClick={handleCheckout}>
                      会計確定
                    </Button>
                  </Stack>
                </Group>
              )}
            </AppShell.Main>
          </AppShell>

          {/* 売上確認モーダル */}
          <Modal opened={salesModal} onClose={() => setSalesModal(false)} title="売上確認">
            <Text fw={700} mb="sm">
              総売上: {totalSales.toLocaleString()}円（{sales.length}件）
            </Text>
            <Table withTableBorder striped>
              <Table.Thead>
                <Table.Tr>
                  <Table.Th>時刻</Table.Th>
                  <Table.Th>金額</Table.Th>
                </Table.Tr>
              </Table.Thead>
              <Table.Tbody>
                {sales.length === 0 && (
                  <Table.Tr>
                    <Table.Td colSpan={2}>
                      <Text c="dimmed" ta="center">売上なし</Text>
                    </Table.Td>
                  </Table.Tr>
                )}
                {sales.map((s, i) => (
                  <Table.Tr key={i}>
                    <Table.Td>{s.timestamp.toLocaleTimeString()}</Table.Td>
                    <Table.Td>{s.total.toLocaleString()}円</Table.Td>
                  </Table.Tr>
                ))}
              </Table.Tbody>
            </Table>
          </Modal>

          {/* 商品管理モーダル */}
          <Modal
            opened={productModal}
            onClose={() => { setProductModal(false); setEditingProduct(null); }}
            title={editingProduct ? "商品を編集" : "商品を追加"}
            size="lg"
          >
            <Stack mb="lg">
              <TextInput
                label="商品名"
                value={newProductName}
                onChange={e => setNewProductName(e.currentTarget.value)}
              />
              <NumberInput
                label="値段（円）"
                value={newProductPrice}
                onChange={setNewProductPrice}
                min={0}
                hideControls
              />
              <Button
                leftSection={editingProduct ? <IconPencil /> : <IconPlus />}
                onClick={saveProduct}
                disabled={!newProductName || !Number(newProductPrice)}
              >
                {editingProduct ? "更新" : "登録"}
              </Button>
              {editingProduct && (
                <Button variant="subtle" color="gray"
                  onClick={() => { setEditingProduct(null); setNewProductName(""); setNewProductPrice(""); }}>
                  キャンセル
                </Button>
              )}
            </Stack>

            <Divider mb="md" label="登録済み商品" labelPosition="center" />

            <Table withTableBorder striped>
              <Table.Thead>
                <Table.Tr>
                  <Table.Th>商品名</Table.Th>
                  <Table.Th>値段</Table.Th>
                  <Table.Th>操作</Table.Th>
                </Table.Tr>
              </Table.Thead>
              <Table.Tbody>
                {products.length === 0 && (
                  <Table.Tr>
                    <Table.Td colSpan={3}>
                      <Text c="dimmed" ta="center">商品なし</Text>
                    </Table.Td>
                  </Table.Tr>
                )}
                {products.map(p => (
                  <Table.Tr key={p.id}>
                    <Table.Td>{p.name}</Table.Td>
                    <Table.Td>{p.price.toLocaleString()}円</Table.Td>
                    <Table.Td>
                      <Group gap="xs">
                        <ActionIcon size="sm" variant="subtle" color="blue" onClick={() => openEditProduct(p)}>
                          <IconPencil />
                        </ActionIcon>
                        <ActionIcon size="sm" variant="subtle" color="red" onClick={() => deleteProduct(p.id)}>
                          <IconTrash />
                        </ActionIcon>
                      </Group>
                    </Table.Td>
                  </Table.Tr>
                ))}
              </Table.Tbody>
            </Table>
          </Modal>
        </MantineProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
