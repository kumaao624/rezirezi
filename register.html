<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レジシステム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f7f8fa;
      --border: #e2e6ea;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --success-hover: #15803d;
      --text: #1e293b;
      --text-muted: #64748b;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 10px;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.03em; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      color: var(--text);
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--bg); }

    /* LAYOUT */
    .layout { display: flex; min-height: calc(100vh - 58px); }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.25s ease;
      position: fixed;
      top: 58px;
      left: 0;
      height: calc(100vh - 58px);
      z-index: 90;
      box-shadow: 2px 0 8px rgba(0,0,0,0.05);
    }
    .sidebar.hidden { transform: translateX(-100%); }
    .sidebar-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-btn:hover { background: #e8edf5; border-color: #b6c4e0; }

    /* MAIN */
    main {
      flex: 1;
      padding: 28px 24px;
      transition: margin-left 0.25s ease;
    }
    main.sidebar-open { margin-left: 220px; }

    /* CENTER BUTTON */
    .center-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { background: #93b4f0; cursor: not-allowed; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: var(--success-hover); }
    .btn-success:disabled { background: #86c9a0; cursor: not-allowed; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-xl { font-size: 1.15rem; padding: 16px 48px; border-radius: 12px; }
    .btn-outline {
      background: var(--surface);
      border: 1.5px solid var(--primary);
      color: var(--primary);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
      width: 100%;
    }
    .btn-outline:hover { background: #eff4ff; }

    /* REGISTER LAYOUT */
    .register-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      max-width: 900px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* PRODUCT LIST */
    .product-list { display: flex; flex-direction: column; gap: 8px; }

    /* CART */
    .cart-list { display: flex; flex-direction: column; gap: 6px; min-height: 60px; }
    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: var(--surface2);
      border-radius: 7px;
      font-size: 0.88rem;
    }
    .cart-item-name { flex: 1; }
    .cart-item-price { color: var(--text-muted); min-width: 70px; text-align: right; margin-right: 8px; }
    .cart-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--danger);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 0.8rem;
      transition: background 0.12s;
    }
    .cart-remove:hover { background: #fee2e2; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .total-line { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.05rem; margin-bottom: 14px; }

    /* INPUTS */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .form-input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-input:focus { border-color: var(--primary); }

    .change-text { color: var(--success); font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
    .error-text { color: var(--danger); font-size: 0.85rem; margin-bottom: 12px; }

    /* MODAL */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      pointer-events: auto;
      position: relative;
      z-index: 201;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; color: var(--text-muted); line-height: 1;
      width: 30px; height: 30px; border-radius: 6px;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--bg); }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      background: var(--surface2);
      padding: 9px 12px;
      text-align: left;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) td { background: var(--surface2); }

    .muted { color: var(--text-muted); }
    .tag-row { display: flex; gap: 6px; }

    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      padding: 20px 0;
    }
    .total-row {
      background: #eff4ff;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<header>
  <button class="icon-btn" id="toggleNav" title="メニュー">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <h1>🛒 レジシステム</h1>
</header>

<div class="layout">
  <nav class="sidebar hidden" id="sidebar">
    <button class="sidebar-btn" id="openSalesBtn">📊 売上確認</button>
    <button class="sidebar-btn" id="openProductBtn">＋ 商品追加・管理</button>
  </nav>

  <main id="main">
    <!-- HOME -->
    <div class="center-box" id="homeView">
      <div style="font-size:4rem">🏪</div>
      <div style="font-size:1.1rem;font-weight:600;color:var(--text-muted);margin-bottom:8px">準備完了</div>
      <button class="btn btn-primary btn-xl" id="startRegisterBtn">レジを開始する</button>
    </div>

    <!-- REGISTER -->
    <div id="registerView" style="display:none">
      <div class="register-grid">
        <!-- Products -->
        <div class="card">
          <h3>商品</h3>
          <div class="product-list" id="productButtons">
            <div class="empty-msg">商品が登録されていません</div>
          </div>
          <button class="btn btn-ghost" style="margin-top:16px;width:100%" id="cancelRegisterBtn">← キャンセル</button>
        </div>

        <!-- Cart -->
        <div class="card">
          <h3>購入リスト</h3>
          <div class="cart-list" id="cartList">
            <div class="empty-msg">商品をタップして追加</div>
          </div>
          <hr class="divider">
          <div class="total-line">
            <span>合計</span>
            <span id="cartTotal">¥0</span>
          </div>
          <div class="form-group">
            <label>お支払い金額（円）</label>
            <input type="number" class="form-input" id="paymentInput" placeholder="例: 1000" min="0">
          </div>
          <div id="changeDisplay" style="display:none" class="change-text"></div>
          <div id="shortageDisplay" style="display:none" class="error-text">⚠ 支払い金額が不足しています</div>
          <button class="btn btn-success" style="width:100%" id="checkoutBtn" disabled>✓ 会計確定</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- SALES MODAL -->
<div class="overlay hidden" id="salesOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>📊 売上確認</h2>
      <button class="modal-close" id="closeSalesModal">✕</button>
    </div>
    <div class="total-row" id="salesSummary">総売上: ¥0（0件）</div>
    <table>
      <thead>
        <tr><th>時刻</th><th>商品</th><th>金額</th></tr>
      </thead>
      <tbody id="salesTableBody">
        <tr><td colspan="3" class="empty-msg">売上なし</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay hidden" id="productOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="productModalTitle">＋ 商品を追加</h2>
      <button class="modal-close" id="closeProductModal">✕</button>
    </div>
    <div class="form-group">
      <label>商品名</label>
      <input type="text" class="form-input" id="productNameInput" placeholder="例: コーヒー">
    </div>
    <div class="form-group">
      <label>値段（円）</label>
      <input type="number" class="form-input" id="productPriceInput" placeholder="例: 350" min="1">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:24px">
      <button class="btn btn-primary" id="saveProductBtn">登録する</button>
      <button class="btn btn-ghost" id="cancelEditBtn" style="display:none">キャンセル</button>
    </div>
    <hr class="divider">
    <h3 style="font-size:0.82rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">登録済み商品</h3>
    <table>
      <thead>
        <tr><th>商品名</th><th>値段</th><th>操作</th></tr>
      </thead>
      <tbody id="productTableBody">
        <tr><td colspan="3" class="empty-msg">商品なし</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ── STATE ──
  let products = [];
  let cart = [];
  let sales = [];
  let editingId = null;
  let sidebarOpen = false;

  // ── ELEMENTS ──
  const sidebar = document.getElementById('sidebar');
  const mainEl = document.getElementById('main');
  const homeView = document.getElementById('homeView');
  const registerView = document.getElementById('registerView');
  const productButtons = document.getElementById('productButtons');
  const cartList = document.getElementById('cartList');
  const cartTotalEl = document.getElementById('cartTotal');
  const paymentInput = document.getElementById('paymentInput');
  const changeDisplay = document.getElementById('changeDisplay');
  const shortageDisplay = document.getElementById('shortageDisplay');
  const checkoutBtn = document.getElementById('checkoutBtn');
  const salesTableBody = document.getElementById('salesTableBody');
  const salesSummary = document.getElementById('salesSummary');
  const productTableBody = document.getElementById('productTableBody');
  const productNameInput = document.getElementById('productNameInput');
  const productPriceInput = document.getElementById('productPriceInput');
  const productModalTitle = document.getElementById('productModalTitle');
  const cancelEditBtn = document.getElementById('cancelEditBtn');

  // ── SIDEBAR ──
  document.getElementById('toggleNav').addEventListener('click', () => {
    sidebarOpen = !sidebarOpen;
    sidebar.classList.toggle('hidden', !sidebarOpen);
    mainEl.classList.toggle('sidebar-open', sidebarOpen);
  });

  // ── MODAL HELPERS ──
  function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  document.getElementById('openSalesBtn').addEventListener('click', () => {
    renderSalesModal(); openModal('salesOverlay'); sidebarClose();
  });
  document.getElementById('closeSalesModal').addEventListener('click', () => closeModal('salesOverlay'));
  document.getElementById('openProductBtn').addEventListener('click', () => {
    resetProductForm(); renderProductTable(); openModal('productOverlay'); sidebarClose();
  });
  document.getElementById('closeProductModal').addEventListener('click', () => closeModal('productOverlay'));
  document.getElementById('salesOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('salesOverlay'); });
  document.getElementById('productOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('productOverlay'); });
  document.querySelector('#productOverlay .modal').addEventListener('click', e => e.stopPropagation());
  document.querySelector('#salesOverlay .modal').addEventListener('click', e => e.stopPropagation());

  function sidebarClose() {
    sidebarOpen = false;
    sidebar.classList.add('hidden');
    mainEl.classList.remove('sidebar-open');
  }

  // ── REGISTER ──
  document.getElementById('startRegisterBtn').addEventListener('click', () => {
    homeView.style.display = 'none';
    registerView.style.display = 'block';
    renderProductButtons();
    renderCart();
  });
  document.getElementById('cancelRegisterBtn').addEventListener('click', () => {
    cart = [];
    paymentInput.value = '';
    homeView.style.display = '';
    registerView.style.display = 'none';
  });

  function renderProductButtons() {
    if (products.length === 0) {
      productButtons.innerHTML = '<div class="empty-msg">商品が登録されていません</div>';
      return;
    }
    productButtons.innerHTML = products.map(p =>
      `<button class="btn-outline" onclick="addToCart(${p.id})">
        <span>${p.name}</span>
        <span style="float:right;color:var(--primary)">¥${p.price.toLocaleString()}</span>
      </button>`
    ).join('');
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    if (p) { cart.push({ ...p, cartId: Date.now() + Math.random() }); renderCart(); }
  }

  function removeFromCart(cartId) {
    cart = cart.filter(c => c.cartId !== cartId);
    renderCart();
  }

  function renderCart() {
    const total = cart.reduce((s, c) => s + c.price, 0);
    cartTotalEl.textContent = '¥' + total.toLocaleString();

    if (cart.length === 0) {
      cartList.innerHTML = '<div class="empty-msg">商品をタップして追加</div>';
    } else {
      cartList.innerHTML = cart.map(c =>
        `<div class="cart-item">
          <span class="cart-item-name">${c.name}</span>
          <span class="cart-item-price">¥${c.price.toLocaleString()}</span>
          <button class="cart-remove" onclick="removeFromCart(${c.cartId})">✕</button>
        </div>`
      ).join('');
    }
    updatePayment();
  }

  function updatePayment() {
    const total = cart.reduce((s, c) => s + c.price, 0);
    const payment = parseInt(paymentInput.value, 10) || 0;

    changeDisplay.style.display = 'none';
    shortageDisplay.style.display = 'none';
    checkoutBtn.disabled = true;

    if (cart.length === 0) return;

    if (payment > 0 && payment >= total) {
      changeDisplay.textContent = `お釣り: ¥${(payment - total).toLocaleString()}`;
      changeDisplay.style.display = 'block';
      checkoutBtn.disabled = false;
    } else if (payment > 0 && payment < total) {
      shortageDisplay.style.display = 'block';
    }
  }

  paymentInput.addEventListener('input', updatePayment);

  document.getElementById('checkoutBtn').addEventListener('click', () => {
    const total = cart.reduce((s, c) => s + c.price, 0);
    sales.push({ items: [...cart], total, timestamp: new Date() });
    cart = [];
    paymentInput.value = '';
    renderCart();
    // brief success flash
    checkoutBtn.textContent = '✓ 完了！';
    setTimeout(() => { checkoutBtn.textContent = '✓ 会計確定'; }, 1000);
  });

  // ── SALES MODAL ──
  function renderSalesModal() {
    const total = sales.reduce((s, x) => s + x.total, 0);
    salesSummary.textContent = `総売上: ¥${total.toLocaleString()}（${sales.length}件）`;

    if (sales.length === 0) {
      salesTableBody.innerHTML = '<tr><td colspan="3" class="empty-msg">売上なし</td></tr>';
      return;
    }
    salesTableBody.innerHTML = [...sales].reverse().map(s => {
      const items = s.items.map(i => i.name).join('、');
      return `<tr>
        <td>${s.timestamp.toLocaleTimeString('ja-JP')}</td>
        <td style="color:var(--text-muted);font-size:0.82rem">${items}</td>
        <td style="font-weight:600">¥${s.total.toLocaleString()}</td>
      </tr>`;
    }).join('');
  }

  // ── PRODUCT MODAL ──
  function resetProductForm() {
    editingId = null;
    productNameInput.value = '';
    productPriceInput.value = '';
    productModalTitle.textContent = '＋ 商品を追加';
    document.getElementById('saveProductBtn').textContent = '登録する';
    cancelEditBtn.style.display = 'none';
  }

  cancelEditBtn.addEventListener('click', resetProductForm);

  document.getElementById('saveProductBtn').addEventListener('click', () => {
    const name = productNameInput.value.trim();
    const price = parseInt(productPriceInput.value, 10);
    if (!name || !price || price <= 0) {
      alert('商品名と価格を正しく入力してください。');
      return;
    }

    if (editingId !== null) {
      products = products.map(p => p.id === editingId ? { ...p, name, price } : p);
    } else {
      products.push({ id: Date.now(), name, price });
    }

    resetProductForm();
    renderProductTable();
    renderProductButtons();
  });

  function editProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    productNameInput.value = p.name;
    productPriceInput.value = p.price;
    productModalTitle.textContent = '✏ 商品を編集';
    document.getElementById('saveProductBtn').textContent = '更新する';
    cancelEditBtn.style.display = 'inline-flex';
    productNameInput.focus();
  }

  function deleteProduct(id) {
    products = products.filter(p => p.id !== id);
    cart = cart.filter(c => c.id !== id);
    renderProductTable();
    renderProductButtons();
    if (editingId === id) resetProductForm();
  }

  function renderProductTable() {
    if (products.length === 0) {
      productTableBody.innerHTML = '<tr><td colspan="3" class="empty-msg">商品なし</td></tr>';
      return;
    }
    productTableBody.innerHTML = products.map(p =>
      `<tr>
        <td>${p.name}</td>
        <td>¥${p.price.toLocaleString()}</td>
        <td>
          <div class="tag-row">
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:0.78rem" onclick="editProduct(${p.id})">編集</button>
            <button class="btn btn-danger" style="padding:4px 10px;font-size:0.78rem" onclick="deleteProduct(${p.id})">削除</button>
          </div>
        </td>
      </tr>`
    ).join('');
  }
</script>
</body>
</html>
